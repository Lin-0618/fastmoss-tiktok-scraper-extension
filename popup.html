<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FastMoss 导出</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <h1>FastMoss 导出</h1>
        <span id="statusBadge" class="badge">待机</span>
      </header>

      <section class="controls" aria-label="抓取控制">
        <label class="field">
          <span>最多页数</span>
          <input id="maxPages" type="number" min="1" max="500" value="50">
        </label>
        <label class="field">
          <span>速度档位</span>
          <select id="speedProfile">
            <option value="slow">慢速</option>
            <option value="very_slow">很慢</option>
          </select>
        </label>
        <label class="checkbox-field">
          <input id="backgroundMode" type="checkbox" checked>
          <span>后台标签页抓取</span>
        </label>
        <label class="checkbox-field">
          <input id="detailEnrichmentEnabled" type="checkbox" checked>
          <span>补全达人/视频详情</span>
        </label>
        <div class="button-row">
          <button id="startButton" class="primary" type="button">开始抓取</button>
          <button id="stopButton" type="button">停止</button>
        </div>
        <button id="resumeButton" type="button">继续抓取</button>
      </section>

      <section class="summary" aria-label="抓取状态">
        <div>
          <span class="label">当前页</span>
          <strong id="currentPage">-</strong>
        </div>
        <div>
          <span class="label">记录数</span>
          <strong id="recordCount">0</strong>
        </div>
      </section>

      <p id="message" class="message">打开 FastMoss 视频页后点击开始。</p>

      <section class="exports" aria-label="导出">
        <button id="copyCsvButton" type="button">复制 CSV</button>
        <button id="downloadCsvButton" type="button">下载 CSV</button>
        <button id="downloadVideoTxtButton" type="button">下载视频 TXT</button>
        <button id="downloadTxtButton" type="button">下载链接 TXT</button>
      </section>

      <textarea id="preview" readonly placeholder="抓取到的 TikTok 视频链接和达人链接会显示在这里"></textarea>
    </main>

    <script src="src/fastmoss-utils.js"></script>
    <script src="src/fastmoss-runtime.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
